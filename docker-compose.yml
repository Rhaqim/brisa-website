services:
  db:
    image: postgres:16-alpine
    container_name: brisa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: brisa_foundation
      POSTGRES_USER: brisa
      POSTGRES_PASSWORD: brisa_local_pw
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brisa -d brisa_foundation"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
