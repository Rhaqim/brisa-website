<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100" role="img" aria-label="Brisa Women's Foundation">
  <title>Brisa Women's Foundation</title>
  <defs>
    <linearGradient id="lg-bg" x1="25%" y1="0%" x2="75%" y2="100%">
      <stop offset="0%" stop-color="#4a1542"/>
      <stop offset="100%" stop-color="#3D1035"/>
    </linearGradient>
    <clipPath id="lg-clip">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
  </defs>

  <!-- ─── Icon mark (0–100px) ─── -->
  <circle cx="50" cy="50" r="50" fill="url(#lg-bg)"/>
  <circle cx="50" cy="17" r="17" fill="#E8704C" opacity="0.28" clip-path="url(#lg-clip)"/>
  <path d="M44,29 Q27,21 19,14" stroke="white" stroke-width="4.5" stroke-linecap="round" fill="none" clip-path="url(#lg-clip)"/>
  <path d="M56,29 Q73,21 81,14" stroke="white" stroke-width="4.5" stroke-linecap="round" fill="none" clip-path="url(#lg-clip)"/>
  <circle cx="50" cy="17" r="9" fill="white"/>
  <path d="M43,26 C41,37 43,48 45,57 L55,57 C57,48 59,37 57,26 Z" fill="white" clip-path="url(#lg-clip)"/>
  <path d="M45,57 Q26,71 20,90 L80,90 Q74,71 55,57 Z" fill="#E8704C" clip-path="url(#lg-clip)"/>
  <circle cx="50" cy="50" r="48.5" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>

  <!-- ─── Wordmark (116px →) ─── -->
  <!-- "BRISA" -->
  <text
    x="116" y="59"
    font-family="Georgia,'Times New Roman',serif"
    font-size="38"
    font-weight="bold"
    fill="#3D1035"
    letter-spacing="1.5"
  >BRISA</text>

  <!-- Terracotta rule -->
  <line x1="116" y1="66" x2="307" y2="66" stroke="#E8704C" stroke-width="1.5"/>

  <!-- "WOMEN'S FOUNDATION" -->
  <text
    x="117" y="78"
    font-family="Arial,'Helvetica Neue',sans-serif"
    font-size="10.5"
    fill="#7A3D79"
    letter-spacing="3.2"
    font-weight="400"
  >WOMEN'S FOUNDATION</text>
</svg>
