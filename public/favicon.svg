<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Brisa Women's Foundation">
  <title>Brisa Women's Foundation</title>
  <defs>
    <clipPath id="fav-clip">
      <circle cx="16" cy="16" r="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="16" cy="16" r="16" fill="#3D1035"/>

  <!-- Sun glow -->
  <circle cx="16" cy="6" r="6" fill="#E8704C" opacity="0.30" clip-path="url(#fav-clip)"/>

  <!-- Left arm -->
  <path d="M13.5,10 Q8.5,7.5 6,5" stroke="white" stroke-width="1.6" stroke-linecap="round" fill="none" clip-path="url(#fav-clip)"/>

  <!-- Right arm -->
  <path d="M18.5,10 Q23.5,7.5 26,5" stroke="white" stroke-width="1.6" stroke-linecap="round" fill="none" clip-path="url(#fav-clip)"/>

  <!-- Head -->
  <circle cx="16" cy="6" r="3.2" fill="white"/>

  <!-- Torso -->
  <path d="M13.8,9.3 C13.2,12.5 13.6,15.5 14.2,18.5 L17.8,18.5 C18.4,15.5 18.8,12.5 18.2,9.3 Z" fill="white" clip-path="url(#fav-clip)"/>

  <!-- Dress (terracotta) -->
  <path d="M14.2,18.5 Q8,22 7,29 L25,29 Q24,22 17.8,18.5 Z" fill="#E8704C" clip-path="url(#fav-clip)"/>
</svg>
