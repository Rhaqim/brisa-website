<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Brisa Women's Foundation mark">
  <title>Brisa Women's Foundation</title>
  <defs>
    <linearGradient id="lm-bg" x1="25%" y1="0%" x2="75%" y2="100%">
      <stop offset="0%" stop-color="#4a1542"/>
      <stop offset="100%" stop-color="#3D1035"/>
    </linearGradient>
    <clipPath id="lm-clip">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#lm-bg)"/>

  <!-- Terracotta sun glow behind head -->
  <circle cx="50" cy="17" r="17" fill="#E8704C" opacity="0.28" clip-path="url(#lm-clip)"/>

  <!-- Left arm — raised and curved outward -->
  <path d="M44,29 Q27,21 19,14" stroke="white" stroke-width="4.5" stroke-linecap="round" fill="none" clip-path="url(#lm-clip)"/>

  <!-- Right arm — mirror -->
  <path d="M56,29 Q73,21 81,14" stroke="white" stroke-width="4.5" stroke-linecap="round" fill="none" clip-path="url(#lm-clip)"/>

  <!-- Head -->
  <circle cx="50" cy="17" r="9" fill="white"/>

  <!-- Torso — slight hourglass taper -->
  <path d="M43,26 C41,37 43,48 45,57 L55,57 C57,48 59,37 57,26 Z" fill="white" clip-path="url(#lm-clip)"/>

  <!-- Dress / skirt — terracotta, flows to circle edge -->
  <path d="M45,57 Q26,71 20,90 L80,90 Q74,71 55,57 Z" fill="#E8704C" clip-path="url(#lm-clip)"/>

  <!-- Subtle inner ring for polish -->
  <circle cx="50" cy="50" r="48.5" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>
</svg>
